"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username$hostname$directory$git_branch$git_status$custom.worktree$cmd_duration
$character"""

add_newline = false

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'

[directory]
style = 'bold cyan'
truncation_length = 3
truncate_to_repo = true
home_symbol = '~'

[username]
show_always = false
style_user = 'bold blue'
style_root = 'bold red'
format = '[$user]($style)'

[hostname]
ssh_only = true
style = 'bold blue'
format = '[@$hostname]($style) '

[git_branch]
style = 'bold purple'
symbol = '⎇ '
format = 'on [$symbol$branch]($style) '

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = 'bold red'
conflicted = '≠'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
untracked = '?${count}'
stashed = '$'
modified = '!${count}'
staged = '+${count}'
deleted = '✘${count}'

[cmd_duration]
min_time = 2_000
format = 'took [$duration](bold yellow) '

[package]
disabled = true

[custom.worktree]
description = 'Show git worktree name when in a linked worktree'
command = 'basename $(git rev-parse --git-dir)'
when = "git rev-parse --git-dir 2>/dev/null | grep -q 'worktrees'"
symbol = '⑂ '
style = 'bold yellow'
format = '[$symbol$output]($style) '
